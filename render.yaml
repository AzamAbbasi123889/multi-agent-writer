services:
  - type: web
    name: multi-agent-writer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --worker-class gevent --workers 1 --bind 0.0.0.0:10000 --timeout 120 --keep-alive 5
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /api/health
